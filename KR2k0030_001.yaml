body:
  text: 武功縣志卷一明康海撰地理志第一夫武功古有斄氏之國也有斄氏有女曰姜原為帝嚳元妃生弃教民稼穡有功堯封于斄號曰后稷后稷卒子不窋嗣不窋末年夏后氏政衰去稷不務乃奔于戎狄之間周興為岐豐之域平王東遷賜豐鎬于秦斄遂為秦邑至始皇列天下為郡縣以斄為榮漢改武功縣𨽻右扶風去古斄城二十里王莽曰新光東漢復徙古斄城魏置為武功郡領美陽縣晉改屬始平郡後魏復為武功郡周改雍州武帝建德三年復置武功郡治邰城已而復為縣隋改𨽻京兆郡唐武德三年改置稷州以武功好畤盩厔郿鳳泉𨽻之尋又析始平置扶風縣四年以岐州圍川𨽻之七年又以𨽻岐州貞觀元年𨽻雍州天授二年又置稷州領武功文明元年析以奉乾陵乾寧二年以奉天置乾州領好畤武功盩厔醴泉而屬京兆府後唐同光中𨽻鳳翔長興元年復立京兆而以武功𨽻焉後晉置武功郡後周復改為縣宋𨽻永興軍路京兆府政和八年同醴泉移𨽻醴州金改武亭縣元復為武功𨽻乾州明興因之而通屬西安府廣四十五里袤五十里東興平東南鄠南盩厔西南郿西扶風西北麟遊北乾州東北醴泉城圍三里二百二十步半附雍原之麓元末張良弼李思齊增築以據守者循原又列十有二城洪武九年長興侯弟都督忠奉詔屯戍于此以控制關內復增築之諸城皆至今存舊志云雍州之域井鬼之次有平原控其東鳳岡翼其西長川帶其北終南太白揖其南蓋古形勝之區强武之國也治凡十五里里名見建置志社學下舊志有山原七川六太乙山屬盩厔太白武功兩山與邪谷水屬郿五丈原屬岐三畤原屬扶風故俱不復載載其今有者東原在縣東其南與雍原相直或曰通西原皆謂雍原云雍原即縣西原城所附者古周原也鳳岡者原北行岡也武亭川縣川也其南十二里古川口蓋漆水川也漆水縣東門外水今謬為武水者也自豳岐之間來縣北受浴水南受湋水入渭鄭漁仲序地里略謂天下如指諸掌而信漆由富平入渭之說蓋括地志未審豳岐涇渭脉絡所在富平在涇東漆在涇西安有岐梁之水越涇而東再至富平始入渭也漁仲誤且如此况其餘乎詩曰自土沮漆書曰斄在漆縣今邰與斄同封里有漆村是也浴水乾州西夾道水也亦從豳西梁山來意此或即沮水關西人讀浴若于于沮固易訛耳漁仲亦以東自富平入渭殊誤湋水即圍川水自扶風東門外受鳳泉水至縣南從漆水入渭建子溝在縣南十七里近慶善宫美陽故城在縣西原八里後漸徙鳳泉東則今扶風境內也古斄城在縣南八里漆村東古有斄氏之國也今縣西南三十里亦有斄城者前漢徙置之爾高泉宫在古美陽城秦宣太后宫也慶善宫在川口東南今沒於渭唐高祖故宅武德六年改名慶善宫太宗所生宅也貞觀六年幸之宴從臣賞賜閭里同漢沛宛帝歡甚賦詩曰壽丘唯舊跡豐邑乃前基粵豫承纍聖懸弧亦在兹弱齡逢運改提劍鬱匡時指麾八荒定懷柔萬國夷梯山咸入欵駕海亦來思單于陪武帳景逐衛文螭端扆朝四嶽無為任百司霜節明秋景輕冰結水湄𤣥黃變原隰儲峙積京坻共樂還譙燕歡此大風詩起居郎吕才被之管絃為功成慶善樂名九功之舞十一年冬獵于武功賦冬狩詩曰烈烈寒風起慘慘飛雲浮霜濃凝廣隰氷厚結清流金鞍移上苑玉勒騁平疇旌旗四望合罝網一面求楚踣爭麑殪秦亡角鹿愁獸忙投密樹鳴鶩起沙洲騎斂原塵靜戈回嶺日收心悲洛汭逸意在渭濵遊禽荒非所樂撫轡更招憂因再幸慶善宫上更賦詩曰代馬依朔吹驚禽愁昔叢况茲承睿德懷舊感深衷積善欣餘慶暢武悅成功垂衣天下治端拱車書同白水巡前跡丹陵幸舊宮列筵歡故老高宴聚新豐駐蹕撫田畯回輿訪牧童瑞氣縈丹闕􅖤烟散碧空孤嶼含霜白遙山帶日紅於焉歌擊筑聊以詠南風帝又有過武功舊宅詩二篇許敬宗上官儀應制奉和焉今悉著于篇可以覩見當時之盛云帝詩其一新豐停翠輦譙邑駐鳴笳園荒一徑斷臺古半階斜前池消舊水昔樹發今花一朝辭此地四海遂成家其二金輿巡白水玉輦駐新豐紐落藤披架花殘菊破叢庭鋪荒草蔓流竭半池空紉佩蘭凋徑舒圭葉剪桐昔地一藩內今宅九圍中架海波澄鏡韜戈器反農八表同文軌無勞歌大風敬宗詩飛雲臨紫極出震表青光自爾家寰海今兹反帝鄉情深感代國樂甚宴譙方白水浮佳氣黃星聚太常參鳳鳴層閣酆雀賀雕梁桂山猶總翠蘅薄尚流芳攀鱗有遺皓沐德忭稱觴儀詩石關清晚夏旋輿御早秋神麾揚珠雨仙吹響飛流沛水祥雲泛宛郊瑞氣浮大風凝漢筑叢烟入舜球翠梧臨鳳邸滋蘭帶鶴洲偃伯歌元化扈蹕頌王遊遺簮謬詔奬珥筆荷恩休宫後又改為慈德寺史逸其年今竇村北仍有寺名慈德蓋沒而遷者也斄亭在縣西南三十里漢地理志載亭長事者也東漢徙縣古斄城而以為亭也今屬扶風縣高望亭在縣東二十五里唐天后武氏行宮世說中宗築以望乾陵者緑野亭今在縣南郭東外為宋儒張子子厚寓所張子與武功簿張山甫厚故武功弟子因從子厚逰亭此講學焉𢎞治八年冬户部尚書沁水李瀚時以御史巡按至諸生以白御史御史乃謀於提學副使今少傅吏部尚書楊公一清楊公以知縣學通有良治能用其民一以責學通踰年乃成改曰緑野書院擇師授徒文教彬彬然勃然興焉書院前為堂祠祭子厚而後建講堂學舍故禮部尚書吳文定公寬有碑碑曰闢中有大儒曰橫渠張先生當宋之盛以道學鳴於時君子以其德尊與孟子比夫自堯舜至于孔子率五百嵗而道一𫝊孔子沒而道無所屬此孟子之自叙而其自任之意亦可見也至昌黎韓氏以軻之死不得其傳則直歸之孟子然至其時已千歲矣所謂以其數則過矣者而秦漢以下儒者亦多而曰不得其𫝊則孟子豈易比哉自唐至于宋又五百嵗始得濓溪周子河南程子先生實並時而出而君子獨以先生比之孟子雖程子亦推稱之則其人品之髙豈非振古豪傑之士哉故當是時學者爭師宗之人至于今過其地仰其人肅然起敬不能自己武功為西安屬縣城南有緑野亭先生之遺迹也蓋先生少時學尚未醇及至洛中見程子論易自以為弗及乃遂西還以與學者講究後既出仕於朝他日治獄外郡而還即移疾屏居南山下以事著書蓋史之所記大略如此緑野之跡豈其西還與屏居之時乎陜西提刑按察司副使楊君應寧由近臣出領學政公勤善教士子經指授者輒取科第君曰此非所以教學者也嘗行縣顧瞻山水明麗可愛所謂緑野亭者歲久既毁而遺址猶存先賢風旨宛然如見始謀即其地構屋以祠先生别為屋俾士子講習其中庶幾仰止景行之意諸生聞之相與感激言於巡按御史李君叔淵雅重風教乃下其事于君君以縣令宋學通嘗復古廢祠亦知急先務者復以事委之學通方經度財用而邦人士咸樂相助數月而功畢名之曰緑野書院擇士子充于其中而以縣學訓導趙文傑為之師俾日講性理之學凡縣學諸生則三日一至聽講其規約大率與白鹿睢陽類未幾若西安鳳翔諸生聞風就學者踵至君時坐堂上躬督勸之渢渢乎道學之流行也君既喜其志之成間以書請記夫養士于學校取士于科第此固朝廷今日之法然學校之所講習者皆經傳之精微欲用其人特以科第取之耳為士者昧其意以聖賢之言止用以資為利祿之計而不知道與法之不相背也今幸賢憲臣有見于此革其故習特為此舉以作興之學政之大無踰于此其用心可謂至矣使今之領學政者皆如君之用心風教其丕變也乎雖然聖賢之言學者于此無弗當講者而橫渠先生尤吾今日臯比之師也其書則正蒙西銘具在因其言求其心反之于躬見之于事而又謹其節文循其以禮為教之規拔于流俗為世醇儒此固賢憲臣所望於士子者也于是取科第出為世用以行其所學賢憲臣之意亦豈為士子禁哉書院建于𢎞治九年六月工畢于是年十二月明年十月癸未記今去改建才二十三年矣其廢壞已十四五况久逺乎緑野亭故在漢義勇武安王廟後稍北原屵下有古洞成化末猶傳有石刻亭記居民惡其害己也乃投其石于井中宋侯欲去狹隘且厭與細民爭校故移之于此此故葆真庵宋侯易民田恢闊耳何若仍置諸屵下為實録近理也縣學訓導趙文傑詩城南百步路西村四五常開小洞門緑野有名亭已沒荒碑少字石猶存經霜柏老乾坤影繞帶河流今古痕仰止橫渠尋未得日中立馬到黃昏正德壬申翰林院修撰高陵吕柟于緑野書院謁橫渠先生祠詩二月入武功載謁橫渠祠春桃雜芳澗好鳥鳴夭枝緑野終南翠含情實在兹昂求曾夙夜人亡道未涯徹臯下程氏執禮西仲尼表時脫支蔓訂頑那有私瞻依真氣象無復夢中疑兹邦有君子跡殊路不岐豪邁存餘烈高懷有我知鵬飛要扶搖鯤化自天池斯文應不斬白日令見之韋應物宅應物長安人漁陽兵亂後流落失職始更折節讀書屏居于武功然莫知何里其經武功舊宅詩云兹邑昔所遊嘉會常在目歷載俄二九始往今來復戚戚居人少茫茫野田緑風雨經舊墟毁垣迷往躅門臨川流駛樹有羇雌宿多纍恆悲往長年覺時速欲去中復留徘徊結心曲姜原墓舊志云在上南門外南去三百六十步又西四十步有三坎墓在坎上與東原梅家莊直隋殤帝墓在縣西原武德五年八月辛亥唐高祖葬帝于此蘇武墓在縣北蘇許公墓在縣西南博村其神道碑在新寨西道南博游師雄墓在縣西北八里碑為耕者沒之地華表存焉東漢地里志曰斄在漆縣其民有會日中以相與夜中市如不為則有災咎故志曰風俗剛徑不事華侈務學力農有古人之風漢志亦曰好稼穡務本業有先王遺風然風俗與時推移繫諸習尚自豫所聞見今已數變矣其可以定論哉成化時人重使氣不肯順理豪傑者至於把持治吏鄉人皆相推畏高之或至武斷于鄊今即有寃者不敢正目下吏矣𢎞治時習侈善饗無豐儉之節日日擊鼓聚㑹靡有厭飫少年得分銀尺布則弗計蔬饌置酒彈絃不避長老時節逰衍男女率冶容祅服占占自見或又好爽快為賢多言習禮送死奢靡擬諸王侯壻奠婦翁至于傾産蓋承平之久法制明白貪官汚吏毋所肆意百姓富庶靡有他慮要之天下皆然不獨此也今或不能供賦役葺田廬矣然人事日趨諸簡約斯亦反古之漸也建置志第二縣署在城西北北抵城西抵后稷廟下原麓東抵文廟洪武初知縣祀重建倉二俱在署內原麓下草場一在城隍廟西圍一百八步唐有柳子厚縣丞㕔壁記殷頌曰邦畿千里周制千里之內曰甸服穀梁謂之寰內諸侯為王內臣其制甚重今京兆府理京師部二十有三縣幅員之廣其猶古也縣吏之長曰令曰丞丞之位正八品下蓋丞述六職以輔其令也秦漢有丞相今尚書有左右丞御史中丞至于九卿之列亦皆有丞下以達天下之縣政有大小其旨同也武功為甸內大縣按其圖古后稷封有邰之地秦作四十一縣邰美陽武功各異至是合焉蓋嘗為稷州已而復縣其土疆沃美高厚有丘陵墳衍之大其植物豐暢茂遂有秬秠藿菽之宜其人善樹藝其俗有禮讓宜乎大雅之遺烈焉貞元之十五年改邑於南里既成新城凡官署舊記壁壞文逸而未克繼之者後三年而潁州陳南仲居是官邑人宜之號為簡靖因其族子存持地圖以來謁豫為記夫以武功疆理之大人徒之多而陳生以簡靜輔其理斯固難矣漢高帝嘗詔天下凡以戰得爵七大夫公乘以上令丞與抗禮故為吏益難今天子崇武念功與漢初相類分禁旅以守縣道武功為多陳生為丞于是而又職盜賊其為理無敗事吾庸可以度哉為之記云宋有游靖重修縣㕔碑大觀四年夏六月汝陽劉侯幹以承事郎來宰是邑侯喜於事功臨政不苟夙夜憂勤以身任責整案牒决訟獄事無巨細靡不究心明年改元政和治行稍著士樂教養農勤田畝強悍者屏息良善者安處老有養疾有醫官無調發民無積逋闔境歡戴政益閒暇一日侯謂同僚曰有官守者常樂因循而憚改作事漏弗填忽傾弗支期以代去自為得計其或好遊觀務將迎起臺榭陂池之役倚勢作威因緣為奸至于公宇之敝往往引嫌而不加意是誠何心哉及其屋壞垣頺蒼皇失措又負偃植疲民蠧財不可勝計如是則公府奚賴豫待罪于此既喜民之易治又喜前人之用心顧瞻庭宇華屋在前金碧輝映乃開封高士徹所建手詔亭也堂皇在後規模簡約乃藍溪吕義山所新正寢也淮陽錢秉創鑒口堂大梁李宗作清心堂河南趙茂曾增修錢庫及居養院陽翟孟通廣闢庾舍內外完葺煥然一新惟令㕔湫隘敝陋殆不堪處驗其故記實天聖中种公世衡改造迄今八十餘年侯復歎曰不廢不興不敝不新舍此而不事不惟有愧于前人之用心亦何異夫樂因循而憚改作者邪矧是㕔也頒詔出令承流宣化之所臨制劇邑絡繹兩川喉襟數路正當四達之衝亦必有以稱矣于是慮材鳩傭徹去棟楹梁桷之折撓與夫蓋瓦級磚之缺者躬自經營悅使有術人不以為勞增廣制度壯偉閎耀人不以為侈㕔既成侯會賔僚落之是日也黃童白叟闐溢庭下瞻仰咨嗟始知公府之嚴令尹之尊也如是嗚呼當是職者必有以處是㕔也處是㕔者必有以任是責也侯之祖坦踐厯中外為時聞人嘗受知于仁廟有醇儒循吏之稱所賜飛白宸翰至今寶之侯念德不怠果能任責以孚民望真可謂善世其家者也則斯文之作豈特記新㕔之嵗月揚厲侯之盛美又得發明名邑之因以詔後人故係之以詞其詞曰太白崢嶸作鎮坤靈武功山連亘古長青堯封后稷周賜秦嬴作邑於此因山命名漢自渭南徙古邰城宇文造周易治中亭中亭之川原隰砥平唐為稷州作輔陪亰復𨽻天府邑是以寧鳳岡西拱武水南傾人尚禮遜俗務農耕神堯誕聖瓌頲騰聲姚合發詠栁子詳評我侯臨蒞訟簡刑清民無調發兵無戰征匪植其私匪僥其榮克紹祖德允協民情恢廣制度新于其㕔㕔非侈已乃尊朝廷吏振其職民樂其成載瞻載仰政治惟馨敢告來者無忘經營儒學在縣署東北抵城東西皆抵民廬而獨堂西七丈許抵北街洪武初知縣祀建正統時知縣俊重修宋有縣令趙茂曾碑士志于道者常患乎不得遂其學得遂其學者常患乎不得信其志遂其學矣時能信之則君子以為榮遇焉此武功縣學之興而銘序之所以作也建中靖國元年夏四月知京兆府孫公覽奏以壽春縣令趙茂曾知武功事秋八月公去崇寧元年春三月茂曽始來是秋貢士府十四縣懸格所取武功居多時歎息其遺者尤衆既冬邑人相謂曰戢盜賊撫良善政令之所在也孝弟姻睦以考其行絃誦講習以和其心性命道德以進其學實士人之所望焉乃謀葺孔子廟聚生徒而淺陋不可居十二月有詔建州學縣學養士之法同僚相語以州縣吏雖尊賤有次其申明孝弟孰後先耶茂曾戄然以興曰疇敢不祗若王之休命明年春訪隙地禀于府願易廟西樓店基為學舍知府事虞公䇿從之徹木于淫祠經費于計臺轉運副使許公天啓可所請即日給官錢五十四萬資其用度於是築新基南向為麗澤堂左右前廡玦布八齊名之以道德皆新作也其東宣聖殿小學職掌之位庖㕑祭器𨽻者所直舊舍足焉補缺益卑與新允稱總五十楹基長二十有五尋廣十有二尋餘六尺經始于二月乙丑落成于三月癸巳嗚呼學校為事必興于聖人極盛之時三代可監也蓋備所養以期所用今吾君待天下之士厚矣天下之士宜思所以副之茂曾何人獲宣聖化且得效犬馬之力于其間為遇為榮罔可言計謹拜稽首叙事勒銘著之金石以告學者銘曰夏后庠序商邦瞽宗周王頖宫申之孝弟漸摩仁義名殊迹同明明我主超三邁五人才是隆民有彛則好是懿德合由以容家黨術國孰庠序學慨然聿崇遞升次舉匪私是與允期于公咨爾有衆學以致用勿尸厥中入孝出弟居仁由義敏則有功以副盛時允能庶幾三代之風據碑則今之縣署乃學不知何時改易之豈金元兵燹之餘草昧之際縣廢而學存治事者姑且居之乃其後竟因而不返與正德八年知縣劉紹重建眀倫堂十三年御史張文眀行縣以廟學頽敝命知縣昌修理更以渭源度頭抽分益之昌憂去明年御史張欽行縣見其益敝乃與守巡參政畢昭副使楊鳳謀通借咸陽行筏抽稅屬同知趙錦監抽會都御史鄭陽檄至嘉啓厥工提學副使何景明知府劉祥又通責諸知縣瑋兹方集工舉事未巳云倉一在堂西南稅課局正統二年罷邰城驛在城東南洪武初知縣祀建驛倉即堂左右廂驛草場在驛東南城隅長寧驛在縣東三十五里俗曰東扶風鎮軍站也成化中移置清水石嘴陰陽學在縣門外今廢為縣獄醫學在大十字東舊有地三間今存其半俱知縣祀所建僧㑹司在報本寺道會司在鴻禧觀申明亭在縣門外與旌善亭同處舊志言遊鳳有古旌善亭又有古倉在社學之西諸行署布政司在宣化街按察司在縣署西東面府署在縣南北面長寧分司即故長寧驛也敝則與興平縣合力修之禮部侍郎河東薛文清公瑄過武功書按察分司㕔壁持節西來過武功扶桑日出曉光紅渭河水逺波聲小太白山高樹影重遺趾已無慈德寺居人猶說有斄封東行無限前朝事盡在黃塵緑野中都御史郴陽曹璉次韻后稷封斄萬世功登臨偏感夕陽紅風生武水波千尺雲鎖香山樹幾重唐宅基湮青草合許公碑古碧苔封行人欲問當年事都在漁樵晚笛中侍郎南陽張周幹次韻南有名山號武功渭河水浸曉霞紅煙迷隋塜高千尺雲鎖邰封厚幾重比屋詩書多巨室滿城桃李總花封太宗唐主曾生此猶說遺踪在寺中都御史淳安方漢次韻誰向兹原啓聖功周人王業伴殘紅猶瞻王氣千年迥誰道名山萬里重慶善有宫留佛住姜嫄無廟任雲封連城舊跡知多少都入荆榛瓦礫中知縣宋學通次韻公暇循阡遍武功滿川春雨落花紅泉通玉井三千丈雲鎖連城十二重郿伯遺亭書緑野姜嫄荒塜倚邰封大唐天子讀書處遺跡猶存上閣中諸急遞鋪總鋪在府衙西迤東三鋪抵興平曰韓店可會長寧迤東北一鋪抵乾州曰董鼂諸社學舊惟儒學西有故稅課局址爾𢎞治癸丑知縣學通以提學條約則里置一學又遴選其子弟可教者里設一師已乃時督率之學各有所在今得詳之有興復者庶幾因而求焉在城西即儒學西者坊廂里在布政分司之西俱得里在王宅村遊鳳里在遊鳳集奉安里在奉安村韓店里在可曽鋪西馬午里在故長寧驛西興城里在焦上村顯義里在燒香臺渭源里在東渭源村㑹同里在鄭村永豐里在張捕村永安里在南姚安村邰封里在髙村姚安里在鏡照村演武教場在東郭門北外養濟院在邰城驛西漏澤園在東郭門南外市集在縣方內者三而縣不論最大者長寧集月無間日遊鳳集普濟集以日相遞而已祠祀志第三文廟在縣署東宋知武功趙茂曾建元世祖十五年至元戊寅縣令王君營復之尋擢行臺掾去長安杜淵繼為令力成其役宋有大觀聖作之碑天下皆有刻兹不載元有李顒碑洪武初知縣祀更建正統巾知縣俊加葺治焉有訓導曲新碑二碑文辭鄙冗故不載社稷壇在北郭門外風雲雷雨壇在南郭門外厲壇在小北門外城隍廟在東門內成化時知縣璲重修正德初知縣鍾仁嗣修焉姜原廟長安志在城外西南原麓間傍有后稷廟今俱亡矣今后稷祠在城內西上故寶意寺址也𢎞治丙辰知縣學通改建祠後又作姜原祠修撰吕柟登謁后稷祠詩夫子天下烈播穀廣炎皇苴茅當兹土種德邈無疆有口咸食力罔極齊穹蒼二月武功曲鸚鳴栁半黃星言拜古祠陟山雲中翔烟川睇春縣覽極獨慘愴風塵翳寰宇嬴黎裂豫腸緬惟躬稼澤誰可使均穰唐高祖祠在鳳岡之巔前則太白行祠也太白蓋封內故山漢永平八年建祠于此洪武丙辰都督耿忠以縣有高祖故宅故祠高祖于太白廟堂之後而别自為太白祠記洪武九年春豫欽承上命領兵來戍陜右操練屯田以為邉備東自臨潼櫟陽髙陵涇陽三原醴泉興平乾州武功西抵鳳翔岐山扶風南至郿縣盩厔等處悉致屯所農作既興厄于亢陽種未得下逺近咸以為憂詢諸故老皆曰西南太白乃本邑之名山上有湫池歲旱則奉迎是水每禱輒應粵以四月中旬擇日齊戒躬致祝辭遣僧覺用等齎香帛祝詣山頂投辭請水既至率官僚吏卒暨郡民數百千人備鼓吹郊迎展祭於武功太白之神祠是夕大雨滂霈三日乃止逺近罔不周沃及六月又旱禱請如前復獲沾足秋八月禾將垂實旱甚復請禱之大雨隨至變枯槁為欣榮易呻吟為歌嘯感神之賜甚渥也越明年丁巳夏四月六月俱旱復奉迎請禱如前嵗之儀而亦兩蒙靈貺雨皆尺餘關輔之中軍民鼓舞二嵗之間凡五禱于神其感應前後一如影響百穀咸成年嵗豐登靈貺駢臻曷伸報答先是鳳岡上舊有神之行祠歲代綿逺廟貌傾損門廡廢闕乃命工匠士卒補完而增修之圖繪兩壁裝塑神像煥然一新又令人于武功故城得神之碑志於遺廟之側具載太白古今顯靈之跡并厯代加封徽號蓋自唐𤣥宗天寶中勑建廟貌封神應公宋仁宗嘉祐初封濟民侯七年改封明應公神宗熙寧八年進封神應王其所以衛國濟民靈應昭晰祀典秩然厯厯可見嗚呼人敬神而獲福神依人而廟享人以誠感神神以靈佑國此幽明自然之理也今以神前後靈感顯應之跡直書刻石置于廟壁庶使後之觀者亦知所崇敬云唐有李白登太白峰杜甫喜達行在所詩因并附之李白詩西上太白峰夕陽窮登攀太白與我語為我開天關願乘泠風去直出浮雲間舉手可近月前行若無山一别武功去何時復見還杜甫詩西憶岐陽信無人遂却回眼穿當落日心死著寒灰霧樹行相引蓮峯望忽開所親驚老瘦辛苦賊中來其二愁思胡笳夕凄涼漢苑春生還今日事間道暫時人司𨽻章初睹南陽氣已新喜心翻倒極嗚咽泪沾巾其三死去憑誰報歸來始自憐猶瞻太白雪喜遇武功天影靜千官裏心蘇七校前今朝漢社禝新數中興年唐太宗祠在北郭內鴻禧觀三清殿後宋元祐戊辰直龍圖閣游師雄建有趙茂曾碑粵有大寶聖人守焉上惟軒義𫝊記罔悉道德乎堯舜仁義於禹湯文王有周大勛集武而幽厲廢之侯國蜂聚七雄蟻爭以啖祖龍而二世亡之漢承秦虐俯首以取權操與備因漢弱而攘裂晉則虛誕不支而宋齊梁陳潰墊于西陲正統墜絶有唐階暴隋以興僖昭寖衰五代竊據天開地泰乃歸于有宋之真人焉顧若相因迭為興廢者得明主賢臣可取法有暴君汙吏足為戒皆所以資我聖時為永永無窮太平之治具也然歷觀前史惟其有甚棼亂之患然後生大英傑之君故必能措海內于升平拯黎庶于塗炭則漢之髙祖唐之太宗其倫乎按唐記太宗文皇帝以隋開皇十八年十二月戊午生于武功之别館有二龍戲門外三日乃乃去是以京兆府武功縣之南有唐慶善宫今為慈德寺其所也北曰報本寺神堯之舊宅焉先是縣圖雖載厥事而祀秩無文龍閣游公慨然興歎率里人即報夲北隅經始廟貌法大壯以建殿宇想天日而形塑繪左右壁間悉圖貞觀朝臣英姿凛然倣佛見當時之盛於是肅嚴致敬有所實元祐三年戊辰嵗也後十四載洛陽趙茂曾被命長邑一日至祠下而龍閣公弟師韓語之故且求以記遂諾之曰僕元祐末典獄平涼見君之伯氏為使者愛民以道率吏以誠觀其激風俗敦教化使法令美意下浹于田父野老之肌骨雖古昔召父杜母之流莫可過者若夫執律馭師則折衝尊爼笑談帷幄豫計勝否驗若符契致朝廷威靈逺震于遐荒重譯之巢穴雖前世班超李牧之輩無以尚矣我思其致今也則亡常企慕之恨不得述其梗概兹幸君之及此也昔梁州人侯柏年以亷泉之名誇其閭里而史筆書之不遺矧公肇是祠宇俾後世識者以人物稱其風氣則追逺厚俗之意豈淺也哉故論前世治亂之迹見文皇帝之英傑因記其祠之者名氏云遊公名師雄字景叔大宋崇寧元年中元日謹記不知何時作觀祠前洪武初都督耿忠重修而仍圖凌烟功臣二十四人于左右壁其上各書唐史本𫝊乃更刻太穆皇后𫝊及帝世系于舊刻帝幸慶善宫詩碑隂躍諸後曰洪武丙辰春忠欽承上命領兵萬餘來關中悉建屯戍因駐武功而控制之武功實有唐太宗誕育之地山川孕靈篤生賢聖信不誣也暇日尋訪故基得古碑於城南榛莽中上刻太宗御製詩二首乃舊立于慈德寺而更樹于安養堂者碑隂載順聖皇后傳嵗代綿邈字畫磨滅殆不可辨于是感文皇之聖孝慨盛迹沉湮遂命工重為摹勒復置于城北鴻禧觀蓋太宗遺像在焉庶使後人益知所敬而𫝊之永久云時洪武丁巳正月十有九日也康長公謁祠詩隋日生靈極羣雄問獨夫八荒歸聖厯數語見皇圖李密終潛洛鄒陽肯事吳瓣香陳閟殿想像賦懸弧名宦祠在縣署內儀門東外所祀古今三十三人鄊賢祠在文廟㦸門西外所祀古今三十八人報本寺高祖别宅也在北門外慈德寺見慶善宫寶意寺見后稷祠橫渠先生祠見緑野書院太白行祠見高祖祠鴻禧觀見太宗祠外有東嶽廟在東郭外漆水東關王廟在南郭西外坎下火星廟在小北門外東北野田中無名氏慈德寺詩昔年高祖宅今日梵王宫塔聳白雲外僧行緑樹中真容唐列聖墨蹟宋諸公半日休心處烹茶話祖風韋應物經寶意上方詩翠嶺香臺出半天萬家烟火照晴川諸僧近住不相識且聽微鐘記往年康長公寶意寺詩傷秋人事絶習靜入招提掃葉坐松下看書忽日西青雲雙翼斂白髮近年齊欲别浮生者悠悠向爾栖前人同高令登太白祠覽李思齊故城元命厭天紀八表靄同昏羣雄各自起天眷安所存李生效時哲攬轡來此軍崇墉俯深壑飛鳥不能伸自謂險宜恃寧知君欲仁古帝發淮浦禆將入咸秦一鼓事乃定初接身已殉寃魂夜夜哭血風千里聞國不務𢎞逺險阻何足云前人書鴻禧觀戴法師壁結髮尚兹道半百靡所指因喜宫殿清常陪隱逸士翳言談真詮清心詣𤣥理雲冥雙鶴歸露下繁蛩已愧爾烟霞人安得從圭匕康阜觀東嶽廟賽神鳴鑼擊鼓天黃昏老姆稽首如蟻蟠板呼喊盆震地起鬼怪嶢﨑相鏖吞女兒百十擁隊出拽朱㸃翠如天孫神祗若來雲若垂節拍未竟新者奔君不見豐年黍稌未彌壠夜半催科方椓門武功縣志卷一
