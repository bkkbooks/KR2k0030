body:
  text: 武功縣志卷三明康海撰人物志第六史記后稷名棄其母有邰氏女曰薑原薑原為帝嚳元妃薑原出野見巨人迹心欣然説欲踐之踐之而身動如孕者居期而生子以為不祥棄之隘巷馬牛過者皆辟不踐徙置之林中適會山林多人遷之而棄渠中氷上飛鳥以其翼覆薦之薑原以為神遂收養長之以初欲棄之因曰棄棄為兒時屹如巨人之志其遊戲好種樹麻菽麻菽美及為成人遂好耕農相地之宜播穀者稼穡焉民皆法則之帝堯聞之舉棄為農師天下得其利有功封棄於邰號曰后稷帝舜曰棄黎民始飢爾后稷播時百穀别姓姬氏后稷之興在陶唐虞夏之際皆有令德后稷卒子不窋立唐高祖神堯皇帝姓李氏諱淵字叔德隴西成紀人涼武昭王皓七代孫自皓五世有名天賜者為魏幢主生虎有功于周與李弼等八人皆拜柱國號八柱國周受魏禪追贈唐國公虎生昞昞生髙祖獨孤皇后髙祖之從母也故文帝與高祖相親愛大業中為岐州刺史治于武功而家焉所謂慶善宫也太宗實生于此大業十三年髙祖為太原留守時煬帝南遊盜賊蜂起太宗知隋必亡隂結豪傑舉大事懼帝不從因與裴寂選晉陽宫人私事帝乃告之五月以詐殺副留守王威髙君雅與突厥連和遂起兵而有天下在位九年傳之太宗太宗皇帝諱世民神堯次子母曰太穆后竇氏開皇十八年己卯十二月戊午生帝于武功宅有二龍之瑞方四歲有書生謁髙祖曰公在相法貴人也必有貴子及見太宗曰龍鳳之姿天日之表年幾冠必能濟世安民書生去高祖懼其語泄使追殺之不知所往因以為神乃採其語名之曰世民大業中突厥圍煬帝于雁門帝年十六應募往救遂𨽻將軍雲定興部下設疑示突厥遂引去後高祖起兵徇西河斬其郡丞高德儒至霍邑會天久雨高祖欲還兵太宗諫曰義師為天下起也宜直入咸陽號令天下今守一城是為賊耳高祖不納太宗哭于軍門髙祖大驚召問之曰還則衆散于前敵乘于後死亡須臾所以悲耳髙祖悟曰起事者女也成敗惟女遂進兵克長安定四方纍進中書令初髙祖起太原非其本意而事出太宗及取天下太宗功益髙髙祖屢許以為太子建成懼廢與齊王元吉日謀害太宗九年六月太宗以兵入玄武門殺太子建成及齊王元吉高祖聞之大驚遂以太宗為皇太子八月甲子即皇帝位帝聰明英武其除隋之亂比迹湯武致治之美庶幾成康自古功德兼隆漢以來未之有也史傳周富辰襄王大夫也襄王十三年鄭人伐滑王使遊孫伯服如鄭請滑鄭人不聽王命而執二子王怒將以翟伐鄭富辰諫曰凡我周之東徙晉鄭焉依子頽之亂又鄭之由定今以小怨棄之王不聽十五年王降翟師以伐鄭王德翟人將以其女為后辰又諫王王弗聽後大叔通于翟后王絀翟后翟人來誅殺談伯富辰曰吾數諫王不從如是不出王以我為懟乎乃以其屬死之漢蘇建其上世因封居故蘇城蘇忿生為周司冦居河內後徙武功杜陵故建或稱為杜陵人以校尉從大將軍青擊胸奴封平陵侯以將軍築朔方後以衛尉為逰擊將軍從大將軍出朔方後一歲以右將軍再從大將軍出定襄亡翕侯失軍當斬贖為庶人後為代郡太守卒官有三子嘉奉車都尉賢騎都尉中子武自有傳蘇武字子卿少以父任為郎稍遷至栘中廏監時漢連伐胸奴通使相窺胸奴留漢使前後十餘輩及胸奴使來漢亦留之天漢元年且鞮侯單于初立恐漢襲之乃盡歸漢使武帝嘉其意遣武以中郎將使持節亦送胸奴使歸因厚賂答單于單于見漢幣遺益驕方欲發使送武等會緱王與虞常謀反胸奴中單于使衛律論虞常欲因以降武武不動律更曲為説武武罵絶之律知武終不可脅白單于單于益欲降武置武大窖中絶其飲食天雨雪武卧齧雪與旃毛并咽之數日不死胸奴以為神乃徙北海上牧羝羝乳乃歸李陵降後單于又使陵往説武陵因武有悲心焉昭帝即位遣使求武陽言天子射上林得雁足繫帛知武所在單于驚始還武及其官屬尚在者惠等九人始元六年春武至京師拜典屬國子元坐法死以别子通國為郎趙禹以佐史補中都官用亷為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱其亷平武帝時禹以積勞遷為御史上以為能至中大夫與張湯論定律令禹為人亷裾為吏以來舍無食客公卿相造請禹終不行報謝務在絶知友賓客之請孤立行一意而已嘗中廢已為廷尉始條侯以禹賊深及禹為少府九卿酷急至晚節事益多吏務為嚴峻而禹治加緩名為平王溫舒等後起治峻禹禹以老徙為燕相數歲悖亂有罪免歸後十餘年以壽卒于家後漢蘇竟字伯况平帝時以明易為博士講書祭酒善圖緯能通百家之言王莽時與劉歆共典校書拜代郡中尉時胸奴擾亂北邊多罹其禍竟終完輯一郡光武即位就拜代郡太守尋拜侍中以病免初鄧仲况擁兵據南陽隂縣為冦而劉歆兄子龔為謀主竟時在南陽以書曉之於是仲况龔降竟終不伐其功濳樂道術作記誨篇及文章傳于世年七十卒于家蘇純字桓公建六世孫也有高名性強切而持毁譽士友咸憚之至私相謂曰見蘇桓公患其教責人不見又思之三輔號為大人永平中為奉車都尉出擊北胸奴車師有功封中陵鄉侯官至南陽太守李育字元春少習公羊春秋沉思専精博覽書傳知名太學深為同郡班固所重固奏記薦育于驃騎將軍東平王蒼由是京師貴戚爭往交之州郡請召育到輒辭病去常避地教授門徒數百頗涉獵古學嘗讀左氏傳雖樂其文采然謂不得聖人深意以為前世陳元范升之徒更相非折而多引圖讖不據理體於是作難左氏義四十一事建初元年衛尉馬廖舉育方正為議郎後拜博士四年詔與諸儒論五經于白虎觀育以公羊義難賈逵往返皆有理證稱為通儒再遷尚書令及馬氏廢育坐為所舉免歸嵗餘復徵再遷侍中卒于官蘇章字孺文純子也少博學能屬文安帝時舉賢良方正對策髙第為議郎數陳得失其言甚直出為武原令值歲飢輒開倉廩活三千餘户順帝時遷冀州刺史故人為清河太守章行部按其姦臧乃請太守設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境望風畏肅改並州刺史以摧折權豪忤旨坐免隱身鄉里不交當世後徵為河南尹不赴卒於家蘇謙章兄孫也初為郡督郵時魏郡李皓為美陽令與中常侍貝瑗交通貪暴為民患前後監司畏其勢援莫敢發問及謙至部案得其臧論輸左校謙纍遷至金城太守去郡歸鄉里後私至洛陽皓為司𨽻校尉為皓所害蘇不韋字公先謙子也年十八徵詣公車會謙見殺載其喪歸瘞而不葬仰天歎曰伍子胥何人也乃藏母於武都山中變姓名募劍客刺皓不克又潛鑿地旁逹皓寢殺皓值皓在厠止殺其妾及其子留書而去更以其父首祭謙皓因憤恚死不韋始改葬行喪後不韋竟以皓客陷死魏蘇則字文師漢平陵侯後也少以學行聞舉孝亷茂才辟公府皆不就起家為酒泉太守轉安定武都所在有威名太祖征張魯過郡悅之使為軍導魯破徙金城太守太祖崩西平麴演文帝以其功加護羌校尉賜爵關內侯後演復結旁郡為亂則悉平之進封都亭侯邑三百户徵拜侍中董昭嘗枕則膝臥則推下之曰吾膝非佞人枕也初則及臨災侯植聞魏代漢皆發服悲哭文帝聞植不聞則也問曰吾受禪而有哭者何也則鬚髯悉張方正論極對傅巽搯曰不謂卿也於是乃止文帝以前燉煌獻徑寸大珠復欲求市則對曰陛下化治中國即不求自至求而得之不足貴也帝默然後從帝獵槎桎拔失鹿帝怒收督吏將斬之則稽首曰陛下欲隆唐堯之化而以獵戲殺羣吏臣敢以死請帝曰卿直臣也遂赦之然以此見憚黃初四年左遷東平相未至道病薨諡剛侯晉蘇愈字休豫魏侍中則第二子也兄恬襲侍中爵為都亭侯恬死無子愈更襲封都亭侯晉受魏禪以為太常卿遷光祿大夫至尚書卒後魏蘇稚字天祐魏侍中則之後位至中書侍郎玉門郡守蘇祐稚子也官至泰山郡守蘇協亦稚子為武功郡守蘇亮字景順祐子也少通敏博學好屬文善章奏與弟湛讓及從弟綽皆著名西土初舉秀才齊王蕭寶夤引為參軍寶夤敗孝武西遷遷吏部郎中大統二年拜給事黃門侍郎領中書舍人宜都王為秦州刺史文帝以亮為司馬謂亮曰黃門侍郎豈可為秦州司馬直以朕愛子出藩故以心腹相委耳賜以御馬八年封臨涇縣子除中書監領著作修國史亮有機變善談笑周文帝為丞相甚重之有所籌議率吻會其旨記人之善忘人之過薦逹後進如恐弗及故當世敬慕焉歷祕書監大行臺尚書出為岐州牧七年徵拜侍中卒所著文都數十篇行于世子師嗣起家黃門侍郎蘇湛字景俊少有志行頗涉羣書年二十餘舉秀才除奉朝請領侍御史加員外散騎侍郎蕭寶夤討關西以為行臺郎中寶夤反令薑儉報湛湛舉聲大哭儉止之湛曰百口居家即時屠滅云何不哭王以窮鳥依人朝廷假王羽翼榮寵至此今國步多虞不能竭忠報德乃欲乘人間隙以羸敗之兵守關問鼎破亡之期不旋踵矣湛不能以積世忠良之基為王族滅也願乞骸骨還鄊里寶夤知湛不為已用於是聽還武功寶夤敗莊帝徴湛拜尚書郎謂之曰聞卿答蕭寶夤甚有美詞湛頓首謝曰臣與寶夤周旋契闊言得盡心而不能令其守節臣之罪也莊帝大悅加散騎侍郎尋遷尚書孝武初以疾卒于家贈散騎常侍鎮西將軍雍州刺史蘇讓字景恕幼聰敏好學初為本州主簿稍遷别駕武都郡守鎮逺將軍金紫光祿大夫周文帝為丞相引為府屬甚見親待出為衛將軍南汾州刺史有善政卒於官贈車騎大將軍儀同三司涇州刺史後周蘇綽字令綽後魏武功郡守協子也綽少好學博覽羣書尤善算術從兄讓為汾州刺史周文為魏丞相餞於都門外謂曰願言君家子弟可任用者讓因舉綽召為行臺郎中凡臺中公文皆綽與條式臺中稱能焉僕射周惠達與文帝論事乃綽所量定文帝異之曰孰與為此議者惠達曰郎中綽也後文帝與公卿觀魚昆明池問故倉地得綽對愈益敬禮乃更泛論天地造化之始歷代興亡之故並馬徐行及池不漁而返詢訪政道夜以達曙整衣而坐不覺其膝之前也即拜大行臺左丞參典機密大統十一年授大行臺度支尚書領著作監司農卿文帝方欲革易時政務行強國富民之道故綽益盡智能牧守令長非通綽六條及計帳不得居官文帝厭文章浮華因魏帝祭廟羣臣畢至乃命綽為大誥奏行之其文與六條俱見本傳綽性儉素不事産業家無餘財以海內未平常以天下為已任文帝亦推心委任十二年卒于位年四十九也子威嗣蘇椿字令欽綽弟也性亷愼沉勇有決斷魏正光中關右賊亂椿應募討之受蕩冦將軍以功纍遷中散大夫賜爵美陽子大統初拜鎮東將軍金紫光祿大夫除都督行𢎞農郡事椿當官強濟特為文帝所知十四年置黨州鄉師自非鄉望允當衆心不得預焉乃令驛追椿領兵其年破槃頭氐有功除散騎常侍加大都督十六年征隨郡軍還除武功郡守既為本邑以清儉自居小大之政必盡忠恕進爵為侯位驃騎大將軍開府儀同三司大都督卒子植嗣隋蘇威字無畏魏度支尚書綽子也襲爵美陽縣公仕郡功曹周革命宇文護以其女新興公主妻焉初威惡護專權乃逃入山中未幾授使持節車騎大將軍儀同三司改封狄道縣公宣帝嗣位就拜開府高祖為丞相高熲屢言其賢召入臥內與語大悅髙祖受禪徵拜太子少保追贈其父為邳國公以威襲焉尋兼納言民部尚書多讜言直論語在本傳煬帝立加威上大將軍楊玄感反帝曰此兒聰明將不為患邪威諷之曰所謂聰明者識是非審成敗也玄感粗何謂聰明直恐亂自此階耳與宇文述對盜賊事威曰往但據長白山今近在滎陽泗水耳復問伐遼東威請赦羣盜遣討高麗上益怒值御史大夫裴藴希旨劾威詔威除名尋從幸江都帝欲復用威藴等奏威昏耄乃止宇文化及弒帝以威為光祿大夫開府儀同三司化及敗歸李密密敗歸東都越王侗以為上柱國邳公王世充僭號署太師太宗平王世充威請謁見稱老病不能拜起太宗遣人數威曰公隋室宰輔政亂不能匡救遂令品物塗炭君弒國亡見李密王世充皆拜伏舞蹈今既老病無勞相見也尋歸長安請見高祖高祖又不許卒於家年八十二嵗蘇夔字伯尼威子也起家為太子通事舍人楊素竒之素每戲威曰楊素無兒蘇夔無父後與鄭譯何妥議樂不行著樂志十五篇以自見仁壽三年詔天下舉達禮樂源者晉王昭為雍州牧舉夔與諸州所舉五十餘人謁帝帝指夔謂侍臣曰唯此一人稱所舉於是拜晉王友煬帝嗣位歷太子洗馬鴻臚少卿關中盜起詔夔巡關中以功進位通議大夫坐父事除名後會丁母憂不勝哀卒時年四十九唐劉文靜字肇仁父韶仕隋戰死贈上儀同三司文靜以死難子襲儀同倜儻有氣略大業末為晉陽令與晉陽宫監裴寂善寂夜見邏堞傳烽歎曰天下方亂吾將安舍文靜笑曰如君言英豪所資也吾二人可終羇賤乎高祖為唐公鎮太原文靜察有大志深自結納既又見秦王謂寂曰唐公子非常人也豁達神武漢高祖魏太祖之徒歟俄坐李密親繫獄秦王顧它無可與計者私入視之文靜喜挑言曰喪亂方剡非湯武高光不能定也王曰今過此非兒女子相愛直欲與共大計文靜曰上南幸兵填河洛盜賊蜉結大連州縣小阻山澤誠能投天會機奮義大呼則四海不足定也今汾晉避盜者文靜素知其豪傑一朝號召十萬衆可得也加尊公府兵數萬一下令誰不願從鼓而入關以震天下王業成矣王笑曰君言正合吾意于是卒起兵以文靜為司馬竟平隋有天下後為裴寂所搆與弟文起並坐法貞觀十三年詔追復官爵蘇世長祖彤仕後魏通直散騎常侍父振周巖州刺史建威縣侯父死王事詔世長襲爵入隋為長安令大業末為都水少監煬帝被弒發喪慟聞行路更為王世充太子太保戍襄陽高祖與之舊數遣使喻降世長輒殺之洛陽平始歸帝帝誚世長世長對曰古帝王受命以比逐鹿一人得禽萬夫斂手豈有獲鹿後忿同獵者問爭肉罪耶帝笑釋之授玉山屯監引見玄武門與語平生後又拜諫議大夫帝欲獵武功時武功新經突厥之冦世長諫之不聽後與宴披香殿世長曰此殿煬帝作耶何雕麗底此帝曰卿好諫似直然詐也顧以我所作為煬帝邪對曰臣聞瓊宫鹿臺非受命聖人所為者陛下武功舊第才蔽風雨時以為足今天下方厭隋侈以歸有道宜刈淫奢復朴素乃雕飾如此欲易其亂得乎帝咨重其言歷陜州長史天策府軍咨祭酒引為學士貞觀初使突厥與頡利爭禮不屈拒却賂遺朝廷壯之出為巴州刺史舟敗溺死蘇朂字慎行武德中為秦王咨議典籖文學館學士尚南康公主拜駙馬都尉遷魏王泰府司馬博學有美名泰重之勸開館引文學士著書名家歷吏部侍郎太子左庶子卒蘇良嗣世長子也高宗時為周王司馬王年少不法良嗣數諫王以法繩府官不職者甚見尊憚帝異之遷荆州長史帝遣宦者采竹蒔上苑所過縱暴至荆良嗣囚之上書言狀帝下詔慰奬取竹棄之徙雍州垂拱初遷冬官尚書拜納言封溫國公留守西京賞遇尤渥尚方監裴匪躬建言鬻諸苑果蔬儲利良嗣曰公儀休拔葵去織未聞天子賣果蔬與人爭利遂止遷文昌左相同鳳閣鸞臺三品遇薛懷義于朝懷義偃蹇良嗣怒叱左右批其頰曳去武后聞之戒曰第出入北門彼南衙宰相行來毋犯之載初元年罷左相加特進仍知政事與韋方質素不平方質坐事誅引逮之后辨其非良嗣悸謝不能興輿還第卒年八十五詔百官往弔贈開府儀同三司益州都督蘇瓌字昌容隋僕射威曽孫也擢進士第厯朗歙二州刺史來俊臣貶州參軍人懼其復用多致書請瓌瓌叱其使曰吾忝州牧能過待小人乎俊臣恨之由是連外徙不得入神龍初始入為尚書右丞再遷户部尚書拜侍中留守京師中宗復政力驅鄭普思流儋州纍拜尚書右僕射同中書門下三品進封許國公中宗崩遺詔太后臨朝相王以太尉輔政宗楚客阻之瓌正色曰遺制乃先帝意安得輒改韋氏敗睿宗即位進左僕射景雲元年老病罷為太子少傅卒年七十二贈司空荆州大都督諡曰文貞開元二年擢中子乂左補闕六年詔配享睿宗廟庭太和中録舊德官其四代孫翔蘇幹瓌從父朂子也擢明經授徐王府記室參軍王好畋每諫止之垂拱中遷魏州刺史河朔飢前刺史苛暴百姓流徙幹檢吏督姦勸課農桑由是流冗盡復以治稱拜右羽林將軍遷工部尚書來俊臣素忌之誣幹與琅邪王沖通書繫獄發憤卒蘇頲字庭碩瓌子也幼敏悟一覽千言能覆誦第進士調烏程尉再遷監察御史被詔覆來俊臣寃獄多所洗宥遷給事中修文館學士拜中書舍人時瓌同中書門下三品父子同在禁苑朝廷榮之玄宗平內難凡制詔皆頲所為又遷工部侍郎以父喪不拜終制後詔以為中書侍郎知制誥始給政事食尋襲封許國公開元四年進同紫微黃門平章事修國史與宋璟同當國璟剛正多所裁決頲能推其長帝前敷奏璟有不及輒助成之故帝皆納焉璟曰吾與蘇氏父子同為宰相僕射長厚自是國器若獻可替否事至即斷公不顧私則今丞相過之八年罷為禮部尚書又檢校益州大都督長史按察節度劍南諸州從封太山詔頌朝覲壇世咨其文還分主十銓事卒年五十八詔贈右丞相諡曰文憲文章與張説齊名時號燕許大手筆云蘇詵字廷言頲弟也舉賢良方正高第纍轉給事中時頲為紫微侍郎固辭帝曰朕自用詵卿奚不若祁奚也出為徐州刺史治有良迹贈吏部侍郎蘇震詵子也以蔭補千牛十餘嵗強學有成人風纍遷殿中侍御史長安令祿山陷京師震與崔光逺殺開逺門吏棄家出奔會肅宗興師靈武震晝夜馳赴行在帝嘉之拜御史中丞遷文部侍郎廣平王為元帥以震為糧科使二京平封岐陽縣公改河南尹纍封岐國公拜太常卿代宗幸東都復以為河南尹未行卒贈禮部尚書富嘉謨舉進士長安中纍轉晉陽尉時新安吳少微亦尉晉陽既相友善有魏谷倚者為太原主簿並負文辭時稱北京三傑天下文章尚徐庾浮俚獨嘉謨少微本經術雅厚雄邁人爭慕之號吳富體豫修三教珠英韋嗣立薦嘉謨少微並為左臺御史已而嘉謨死少微方病聞之為慟亦卒蘇源明初名預字弱夫少孤寄居徐兖工文辭有名天寶間及進士第更試集賢院纍遷太子諭德出為東平太守召為國子司業祿山陷京師源明以病不受偽官肅宗復兩京擢考功郎中知制誥值禁中禱祠窮日夜而史思明陷洛陽詔幸東京親征源明上疏極諫帝嘉其切直遂罷東幸以祕書少監卒蘇辨字元容瓌從孫也擢進士調奉天主簿德宗出狩縣令計事在府官屬皆惶恐欲遁走辨曰昔肅宗幸靈武至新平安定二太守坐伏匿斬以徇諸君知之乎衆乃定車駕至儲偫畢給帝嘉之試大理司直朱泚平進監察御史纍擢倉部郎中判度支裴延齡死帝召辨見延英賜紫衣金魚以度支郎中副知度支事位郎中上度支有副自辨始辨通學術吏事精明承延齡後平賦緩役略煩苛人賴其寬久之遷户部侍郎判度支改太子詹事尋坐腐粟貶汀州司户參軍是時兄衮為贊善大夫冕京兆士曹參軍以辨故貶衮永州冕信州皆司户參軍衮年老暝不能視帝閔之聽還又有稱冕才者帝悔不用重追冕遂不復用數年起辨為滁州刺史卒辨聚書至三萬卷手自讐定當時稱與祕府埒云蘇鶚未詳其行事崔豹古今注云有行義集十卷元讓擢明經以母病不肯調侍膳不出閭數十年母終廬墓次廢櫛沐飯菜飲水咸亨中太子監國下令表闕于門永淳初巡察使表讓孝弟卓越擢太子右內率府長史歲滿還鄉里人有所訟皆詣讓判中宗在東宫召拜司議郎入謁武后望謂曰卿孝於家必能忠於國宜以治道輔吾子尋卒蘇檢字聖用舉進士厯中書舍人昭宗天復二年拜工部侍郎同中書門下平章事朱全忠崔胤反復為姦朝廷急於纍卵檢以韓偓有才辨數言于李茂貞欲以相偓偓隂附胤知事不可不肯拜初茂貞與諸宦者恐上自别用人故協力薦檢明年二月丙子胤與全忠竟害檢夫蘇氏除世長至辨史各有傳豫讀唐書宰相世表覩其人至繁衍顯盛也今略序之使好事者得誦説焉按表蘇氏猶有祕書監一人踐言都督一人琛駙馬都尉二人彥伯雲郎中二人綰工部獻駕部刺史八人亶台州澄沁州均虔州務寂梓州妙泉州易黃州奕光州繫滁州太府卿一人憻太守一人顔淮安驍衛將軍一人韙國子司業一人虔王傅一人盈而其系推自平陵侯檢别為蘇氏非平陵侯後宋蘇曉字表東父瓚仕後唐厯祕書少監曉宋初為淮南轉運使嵗入百餘萬緡開寶三年遷司勳郎中改西川轉運使仍掌京城市征發李守信贓拜右諫議大夫判大理寺卒年七十三然深刻少恩非長者云遊光濟官至大理寺丞贈朝請郎子師雄最知名蘇昞字季明與遊師雄同學于張載乃後昞又卒業二程元祐末吕大忠薦之起布衣為太常博士坐元符上書入邪籍編管饒州卒遊師雄字景叔第進士為儀州司户參軍德順軍判官與鄜延諸將計議邊事賴以無患元祐初為宗正主簿議棄四寨事甚力執政弗從遷軍器監丞夏人謀分據熙河師雄語劉舜卿制之之策已而皆大捷斬獲幾四千人虜鬼章及其大首領九人遷陜西轉運判官提點秦鳳路刑獄夏人侵涇原復入熙河師雄議於定西通渭之間建三柵及護耕七寨以固藩籬為無窮之利詔以師雄議付范育入拜禮部員外郎加集賢校理為陜西轉運使計轉輸事上皆從之有詔詣闕哲宗勞之曰洮州之役可謂雋功但恨賞太薄耳拜衛尉少卿上數訪邊防利病師雄具慶厯以來邊臣施置之臧否朝廷謀議之得失及方今禦敵之要凡六十事名曰紹聖安邊䇿上之出知河中府進直龍圖閣知秦州未至夏人擾邊詔攝熙河與使者及秦帥共謀之師雄志在築城守禦而使者方鋭於討擊然卒用師雄策自復洮州之後于闐大食佛林邈黎諸國皆懼悉遣使入貢未幾還秦徙知陜州卒年六十師雄慷慨豪邁少有文學事橫渠張載益得其奧及被委用有志事功議者以用不究才為恨弟師韓亦以英俊知名子靖竑􅔲佇竦皆舉進士傳其家遊靖舉進士為河南府佐軍巡判官管勾秦鳳路機宜文字有學行克肖厥父文章簡易順理時以為工元康氏諱廷瑞字子安讀書長寧西門原上有弟子數百人宗師子安明性理之學於是稱之曰西原先生後辟為興化訓導其行事見於家譜大傳孫諱汝楫在皇明最有勳德皇明康氏諱汝楫字濟川洪武初舉明經為縣學訓導太祖皇帝選天下文學知名之士教太子諸王乃以訓導為燕王相參録其軍國事洪武末出為安嶽知縣靖難後太宗皇帝徵赴行在拜刑部左侍郎留北京輔皇太子凡城守置治事皆聽便宜行之侍郎有大勳德上將封之為侯固死不拜比卒又上表乞勿賜贈諡上竟皆允之一日上召其子俱來值中子年賈在外乃以長子諱爵為上林苑監左監正季子禋為監副又賜中子年千金鏹數十千貫敕關津吏往來不得詰察上謂廷臣曰侍郎忠其子孫必忠聞侍郎尚有孫俟長當并官之又曰二子初仕或未諳悉法禁錦衣衛可記名有過勿刺洪熙元年贈工部尚書諱爵字以德在上林即條陳山西苑户久役之苦上皆從之纍遷南京太常寺卿禋字以敬有文名官至右通政太常子諱健字自強天順初有詔起尚書孫應祀者受通政司知事知事子諱鏞字振逺世稱康長公以文章名世目曰關西夫子仕為平陽府知事其言語行事並見家譜大傳子阜字德瞻七嵗能詩十八嵗死以次子海贈翰林院修撰馬京字子髙少學於康尚書以文學知名洪武十三年進士及第授翰林院編修永樂初拜行部右侍郎未幾卒仁宗皇帝贈少傅禮部尚書諡文簡京為人方正有才思立朝多所建明上嘉納之然取之囹圄之中而卒于效用之始故其美大莫究時論惜焉子健以蔭為太常寺典簿後至兵部主事天順末主事孫昭舉鄉試後為武邑知縣昭子安以例為國子生終榮河知縣列女帝嚳元妃薑原有斄氏女也初無子與帝嚳禋祀郊禖以求有子出遇巨人迹悅而踐焉震動有孕乃生后稷是為周人生民之祖詩曰厥初生民時維薑原蓋此之謂也餘見史記周本紀太薑者周太王妃有邰氏女也生太伯仲雍王季太薑有色而貞順率導諸子至於成童靡有過失太王謀事必於太薑太薑相太王修復后稷之業積德行義至其孫武王遂有天下此太薑之德也苻秦竇滔妻蘇氏名蕙字若蘭陳留令武功蘇道質第三女也年十六歸於竇氏滔甚敬之苻堅冦襄陽以滔為安南將軍留鎮襄陽滔携寵姬趙陽臺往蘇氏怨之不肯與俱而滔竟與斷音問後蘇氏悔恨自傷因織錦為回文縱廣八寸計八百餘言縱橫反覆皆成文章因以寄滔襄陽滔覽之感其意於是迎蘇氏來襄陽而歸陽臺於關中恩好愈篤焉著有文詞五千餘言隋亂不傳止傳其回文回文有武后記言蘇氏事甚詳皇明丁氏喬銓妻銓死無子守節四十餘年始終無玷正德二年知縣鍾仁以聞後八年命始下知縣紹表其門喬氏李鋭妻鋭死貧無以依挈其女居故族兄祿家織絍自活幾四十年女子已嫁值壻死乃更與女居節操莊嚴士大夫纍言諸有司知縣瑋至始上聞於朝云王氏周村人郝讓妻讓少喪父母武氏年二十餘寡居辛苦萬狀匍匐至讓成立為娶婦有子子夭乃讓亦死王氏親黨多勸之嫁不從曰有姑在不可無與養也姑乃更勸之王氏曰姑昔值舅亡有盛年艾容誓死不更人所以極辛苦者徒以讓爾今讓不幸死無能終老母之養妾為之婦忍姑更匍匐耶於是卒意自守力作養姑終身不衰選舉志第七武功代有豪俊其被與選舉要不鮮矣自傳記所覩載者魏有蘇則舉孝亷後魏有蘇亮蘇湛舉秀才唐蘇瓌蘇頲蘇踐言蘇綰蘇獻富嘉謨蘇辨蘇亶蘇奕蘇憻蘇顔蘇虔蘇檢舉進士蘇幹元讓蘇澄蘇均蘇務寂蘇妙蘇易蘇繫擢明經蘇詵蘇盈舉賢良方正宋遊師雄遊靖遊竑遊􅔲遊佇遊竦元張泰皆舉進士泰子張緝孫張顯舉鄉貢明興科舉之制未定其舉明經有先尚書公舉進士有馬文簡公舉人材有吉安府同知王璽瑞州府同知文顯德安倉大使康舉自科貢之制定士非此不能仕今列諸科貢者於篇使後世足覽焉科洪武十二年一人馬京見前三十年二人黃琮嶽州府通判成禮涪州訓導三十三年三人張羽顯子文水縣知縣李源高唐州吏目董嚴長清縣知縣永樂元年一人舒忠朔州學訓導三年一人李欽驍騎衛經厯六年一人景升房山縣主簿九年二人張純于岩武邑縣學訓導十二年一人趙庸十五年二人魏浩譙忠十八年三人楊時張敏武成二十一年二人劉徵引禮舍人王兟宣德元年一人符信以子泰封鄭府右長史正統三年一人符泰洪洞永平學訓導林偃城學教諭鄭府右長史六年一人丁璿乙丑進士行人司行人九年二人張翺清逺肅寧縣縣丞絳州判官李紀趙州學訓導十二年一人景丙景泰元年二人張輔羽子太原府推官劉縉臨縣知縣四年二人陶清馬昭京孫武邑縣知縣七年一人馬驥潞城學訓導房山南部縣知縣天順三年一人丁仕能璿從子灘縣平陸富順學教諭大同縣知縣六年一人李琳蠡武強縣知縣成化元年二人李得春平陽南陽府學訓導壺關榆次縣學教諭馬騆驥弟二十年進士户部主事員外郎河南按察司僉事布政司右參議四川左參政進右布政使致仕七年一人魏璽潞城鹿邑學訓導吳江商河學教諭密雲衛學教授國子監助教代府右長史十六年一人文朴顯從曾孫浮山縣知縣𢎞治二年二人侯相蒲州學正湯隂縣知縣楊和閬中臨淮訓導玉田縣知縣謫涪州判官十一年三人楊秉中舟子正德六年進士行人司行人監察御史康海十五年進士翰林院修撰劉臣丹稜縣知縣十四年一人李堯賔得春子十七年三人康浩鑾中子正德六年進士户部主事吳世瞻銅梁縣知縣張舜舉羽玄孫太原麻城學教諭儀封內鄉縣知縣正德二年一人趙雍熙壺關任丘學教諭清逺縣知縣五年二人楊瑁景懷子許州學正朱維屏聰子伊陽縣學訓導十一年二人牛兆祥經子李朝綱陽曲縣學教諭十四年二人耿儒耿朝用貢洪武時十人鄭岩十七年安邑縣知縣張憲十九年刑部主事袁溥二十一年浙江按察司僉事王裾二十三年仁壽縣知縣崔裕二十五年榮曷學訓導楊貞二十七年户部照磨王用二十九年刑部員外郎鄧忞三十一年山四按察司經厯楊凱三十三年銅梁縣知縣張貞三十五年永樂時十八人張謙二年廣南府檢校鄭訥四年耿輝六年府軍前衛經厯王郁八年劉鈞十年定興縣縣丞楊沂十二年留守千户所更目徐智十四年何玉十六年四川安撫司吏目馬健十八年鴻臚寺引禮舍人虎文二十年洪熙時一人文郁元年隰州吏目宣德時六人李璿二年宋瑀四年王佐六年何著八年墊江縣主簿朱琛九年董璉十年正統時十四人鄧信元年李茂二年宇文泰三年光祿寺監事徐州判官馬良四年包整五年富州吏目宇文政六年李恭七年李俊八年段暹九年曲陽縣主簿李耔十年平陽府通判殷倫十一年張本十二年三萬衛經歷四川布政司都事王瑾十三年府典儀張隆十四年景泰時七人趙興元年大同縣丞許敬二年劉福三年江都縣主簿黨惠四年澤州學訓導隆慶衛學教授鄭莊五年榆社縣丞馮寅六年內鄉縣丞贈兵馬副指揮張鳳七年天順時四人曹俊二年李永四年順慶府推官王翰六年江寧縣主簿申靖八年荻水鎮巡檢六年又許貢四十已上者十人郭維新東昌府知事尚望中城兵馬副指揮順天府推官侯清蒙城縣丞茍容綘州稅課局大使李尚義葛瑶衛輝遞運衛大使寧春楊福河隂縣訓導劉彧溫江縣主簿任和成化時十一人張繪二年安慶府山口鎮河泊所官于壽四年李文圓六年序班臨胊縣主簿康長公諱鏞八年見前志馬負圖十年杞縣丞康演舉曾孫十二年段子玉十四年修武縣主簿康錫長公弟十六年藁城縣丞張通十八年嶽池縣主簿李迪二十年衛輝府知事劉振二十二年夔州府檢校𢎞治時十一人閻秀元年夏縣主簿楊舟三年夏縣學訓導封監察御史張巽羽孫五年丁丙七年大同左衛學訓導鄭府伴讀李本九年金堂縣主簿朱聰十年貴州蠻夷長官司吏目牛經十一年常州府經歷康錦長公季弟十二年長洲縣丞黨資祿十三年富順縣丞劉大經十五年大同縣丞馮義寅子十七年南城兵馬司副指揮正德時張鸞翺繼子元年朔州山隂學訓導蔡蘭三年宜陽學訓導康永嘉演子五年符珽泰子五年西鄉貢趙章七年奉化學訓導楊珂景隆子九年順慶府學訓導黨旺惠子十一年汜水學訓導張儒珍十三年河間縣訓導張秉翺中子十五年武功之士所進用於昌時者如是而已舊志不列其行事夫國家承平百五十年諸君子豈無表然在人者今已不述後何以觀焉余於是懼因鄉先生各道其所知乃略著其行事於乎盛哉録不及其存者君子事定於蓋棺之後也張憲美儀羽倜儻有氣年十八嵗貢入太學太祖愛之以為刑部主事上每以部中事問憲憲應對殊有條理同官有罪者或引及憲上曰是我小主事邪必非若比遂置不問乃後竟以引逮謫戍鞏昌至玄孫瑛有功升百户袁溥字汝公為浙江按察司僉事有令名訟者至則迎刃而決無有凝滯以罣誤左遷吳縣知縣後又坐解户失金謫戍黃琮字伯玉通周易為嶽州通判能其官人稱亷平歸時行李蕭然若諸生時也張羽字仕儀為文水知縣政令嚴眀發摘若神桀民有稱十虎三彪一太嵗者羽悉按法徙之時以為能王用初為刑部主事用法平恕私門無所交接事聞太祖皇帝嘉賞之因遷員外郎李耔為平陽府通判平陽人云有遺愛焉符泰字伯亨信子也舉時年十八在太學聞母憂徒跣至家廬居墓側者五百日父命徙歸乃更廬於中門外免喪除洪洞訓導能以禮教諸生自令丞士大夫以下皆殊敬之有繼母憂改永平學天順初上言十一事極論時政得失訓導滿遷林縣教諭先是吏部以泰擬選御史會目眚不預再有繼母憂改偃城攝偃城縣民以為平乞為令巡撫纍疏薦補不報教諭滿乃拜鄭府右長史在鄭府多有諫正王敬納之詳見家集泰篤厚恭謹孝友天成居鄉守官人無間言年六十七卒于官子珽為西鄉學生正德五年貢太學丁璿字大器第進士除行人為人溫恪罔躁所交人無小大皆敬信之卒後士大夫過者必哭加賻焉成化甲辰飢李侍郎來賑關中行縣至則首訪其家拜其妻歎曰吾大器乃如此天乎善人何尤即以所有資俸盡與之後其妻亦以貧死子紹先讀書無成死無子張翺字鳳儀為清逺縣丞有惠政士大夫至今傳誦其賢改肅寧治效若清逺後遷絳州判官益為絳人所愛子秉鸞皆嵗貢李紀以貧為趙州訓導質朴無華教人勤懇詳至罷歸後乃益貧又不欲干謁人猶聚徒教授取給焉可以知其志矣馮寅字子敬未仕時聚童子為小學之教凡灑掃應對之屬曲盡其節後為內鄉丞歸已足以自飬矣猶孳孶教人不憚煩碎有古昔鄉先生之風焉今士大夫謝仕以居者或不欲自課其子孫况凡民童子哉尚望字周臣為中城兵馬副指揮有膽氣能不奪於豪貴禁姦止暴令出唯允中城人殊敬畏之至今猶以為良兵馬云有劉原者故無子以養子治業及原有子原未幾死矣養子私其蓄積毋肯與原子原妻厯訴皆為養子請託失理一日妻夢原令訴望所妻來訴望已先夢原訴指其匿貨所在隨發得之人以為神遷順天府推官致仕年七十卒馬驥字漢房潞城訓導遷房山知縣有父憂改南部性爽慨重然諾好義有氣鄰里婚喪多所成助出百金急人之難無吝色篤愛同氣老而不悔罷南部歸日與士大夫故舊遊宴相樂曰嵗月如坂上走丸直不可不遣也年六十五卒于家楊福字宗善甘貧嗜學居寶意上方從遊及門者若將百人福每雞鳴而起寒暑風雨無所間後除河隂訓導以所教於寶意者教之士子沛然從焉至今河隂人猶稱福善教不忘也福後卒于河隂李得春字時魁初為平陽訓導年甚少也能自治威嚴諸生咸畏憚之後改南陽金城段先生堅知南陽獨禮重之段先生號有理學故得春益造詣罔謬遷壺關教諭以憂改榆次致仕歸貧至居敝不葺人以為難未嘗請託長吏聞居詠歌古昔絶不談世事年八十卒魏璽字廷寶厯潞城鹿邑訓導吳江商河教諭所至皆有嚴憚遷國子助教再遷代府右長史卒于官璽為人質直好義嗜學秉禮平日未嘗妄言謾論聞非禮之言則耳頰俱赤待人無衆寡小大各得所敬曰施報之際固宜若此耳年六十八卒侯相字良弼以親老求為蒲州學正學正滿遷湯隂縣知縣湯隂道衝政繁相欲以簡易為理遇當塗者或至濶略體面當塗者乃以為迂相益自信不肯易居二年有憂歸尋罷縣貧居尚志年五十八卒其以例入監者天順六年四人王聚大同府知事張禮南皮縣縣丞宇文縉大寧前衛經歷廣安州同知宇文慶通江縣主簿成化二十年八人郭友鴻臚寺序班王縉聚子鴻臚寺序班馬萬國驥子雙流曹縣主簿馬萬衢驥子清豐縣主簿陳紀伊德馬安昭子東安主簿萊縣縣丞榮河縣知縣王大經聚子伊府典儀正正德三年十人王佩昭子馬萬域驥子魏鏷璽子劉璣大經子馬執中騆侄王官丁誥紳子張世翀王繼祖大經子王堂璣子十年三人張仲儒馬正中騆子馬存信安子掾史入官者成化以上縣不過數人今益多不可勝紀矣取其卓然名于官者列諸篇焉張輝廣陵縣典史李能內鄉縣典史楊景隆鳳陽廣濟關河泊所官景德章南樂縣縣丞楊景懷光祿寺監事涿州判官丁紳邯鄲縣典史賀澄蠡縣典史楊景新河津縣主簿王昭丹稜縣典史張翺濟南遞運大使宋得山溧水縣典史魏經髙縣典史武職趙興蔚州衛指揮同知靳通定遼後衛指揮僉事秋敬會州衛千户王大秦州衛百户至子英升洮州衛千户杜安開平衛副千户馬記留守前衛副千户張瑛憲玄孫鞏昌衛百户佘四涼州衛百户李貴寬河衛百户賀胡兒河州衛百户李忠興隆左衛百户封贈尚文英望父贈中城兵馬司副指揮馬肅騆父贈户部主事康鑾長公弟浩父贈户部主事耆民馬宗祿有信義持是非鄉人服焉年九十三殁康和舉子長厚有禮於物無所忤常自言曰人唾吾拭人打吾避人罵吾謝吾何較乎人至今稱其言黨端富財好義喜怒不形有偷兒夜入其廥端察得之謂曰不足何不告我而若此更以所偷令子弟豫而遣之終身不肯言偷兒名喬鼎謹厚詳審于人無所爭弟鼒並有良名又皆頎貌美髯鄉人目曰大髯小髯云張朋舉親宗睦鄰無所怨惡殁時年八十有九滸西子曰余為武功志其義例皆見諸篇余不知其詳與略也故猶望後之君子繼而正焉志作于正德十四年秋七月朔日成於是秋八月三日冬十月十九日隴郡馮韶書成入梓武功縣志卷三
