body:
  text: 武功縣志地理𩔖三都㑹郡縣之屬提要臣等謹案武功縣志三卷明康海撰海字徳涵武功人宏治壬戌進士第一授翰林院修撰以救李夢陽事坐劉瑾黨削籍明史文苑𫝊附見李夢陽𫝊中是志僅七篇曰地理曰建置曰祠祀曰田賦曰官師曰人物曰選舉凡山川城郭古蹟宅墓皆括于地理官署學校津梁市集則歸于建置祠廟寺觀則總以祠祀戸口物産則附于田賦藝文則用吳郡志例散附各條之下以除冗濫官師則善惡並著以寓勸懲王士禎謂其文簡事核訓詞爾雅石邦教稱其義昭勸鑒尤嚴而公鄉國之史莫良于此非溢美也志刻于正徳己夘萬歴間再經刋行旋復散佚乾隆二十六年武功知縣瑪星阿得抄本于孫景烈因為重刋其圈㸃細評皆出景烈之手頗嫌疣贅又王士禎稱武功志載璇璣圖而此本無之考海孫吕賜嘗刻璇璣圖讀前有題識云余錄先太史縣志真本悉依原編惟蘇氏詩未錄非敢輕有變置故附數語錄本之末述先太史之意冀来者之鑒余志也然則此本乃吕賜所刋除矣明人好改古書乃至祖宗著作子孫亦必變亂之惟庸故妄斯之謂歟乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀武功縣志原序予嘗兩至武功涉漆釣湋陟雍丘逰鳳麓渡渭而尋太白終南之竒北顧九嵕諸山則見碧流襟帶翠巘揖讓珍木蔚薈灝光組繡風氣翕乎四來龍虎儼而交應未嘗不臨景命筆而羡斯地之勝也及予訪后稷之墟覽唐太宗之舊問蘓子卿之𦙍叅張横渠之象誦康尚書之勛然後知斯地之效而對客談山言未或忘之夫美稼不發墝埆修松不挺培塿斯已然矣若乃楨高而築堵不繼表正而式影弗端則求諸嗣有政敎者焉夫后稷政之祖横渠教之宗官無后稷之心者皆忍夫師無横渠之志者皆貨客如仁義之有托即政教之咸興繄兹人物有不恒茂者乎雖然政不必皆官識法者即可立教不必皆師見道者即可端故王烈之政亦行太原綿駒之歌能教齊右武功之志凡以憂夫此也志七篇地理約而不漏建置則而有據祠祀先今而後古官師直書而勸戒自形人物之志浩乎其無窮也君子于是乎思古于是乎徵今于是乎開來其志已勤矣選舉崇義而黜利葢志之良者也學者觀其志目亦思過半矣是志也撰之者吾友康子徳涵刻之者邑侯西蜀馮玉仲則斯政教也為有歸矣正徳己卯冬十一月甲寅涇野吕柟書武功康子作志七篇以記載武功之故緒理要會葢燦然明備矣至其覈事顯義用昭勸鑒有可述焉夫先王之政紀其山川辨其疆域程其土宜稽其俗尚肆其采物以謹封守而察時變故書序九丘詩陳列國採風者具其美惡董事者正其得失務在因道財化追俗為制以施于久逺已爾夫天下之勢其所由來亡不有漸茍非早見而力救之則其勢莫可回而患成循約而治厚生而安其始未嘗弗一致迨于風尚澆淺而徳實靡波其治不可長也户口繁增而生利蹙薄其安不可久也可以弗愼其漸哉余覧康子之書其地畝則由狹而廣户口則由寡而衆賦役則由省而興財費則由約而靡其産業則由富而貧地利則由饒而減民性則由强而弱風俗則由厚而漓吏治則由良而奸人才則由實而虛文教則由振而委亡弗降本流末廢正趨弊者矣嗟乎豈獨一邑然哉由此可以例諸四方矣正徳十四年己卯冬十二月五日大復山人汝南何景明撰并書
